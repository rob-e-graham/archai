# ══════════════════════════════════════════════════════════════
# ARCHAI — Docker Compose
# Backend + Qdrant + Cloudflare Tunnel
# Ollama runs natively on macOS (Metal GPU) — accessed via host
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose logs -f archai     # watch backend logs
#   docker compose down               # stop
#
# Remote: via Tailscale VPN or Cloudflare Tunnel
# Cloudflare: archai-api.fineartmedia.tech
# ══════════════════════════════════════════════════════════════

services:
  # ── ARCHAI Backend ──────────────────────────────────────────
  archai:
    build:
      context: ./backend-archai
      dockerfile: Dockerfile
    container_name: archai_backend
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      NODE_ENV: production
      ARCHAI_ALLOW_MOCKS: "true"
      ARCHAI_BASE_URL: http://localhost:8787
      ARCHAI_PUBLIC_URL: https://archai-api.fineartmedia.tech
      # Ollama runs natively on macOS for Metal GPU — connect via host
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: qwen2.5:14b
      OLLAMA_CURATOR_MODEL: qwen2.5:14b
      # Qdrant in the same Docker network
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: archai_objects
      # Data
      AUX_PAGES_DIR: /app/public/aux
      MEDIA_CACHE_DIR: /app/data/runtime/media-cache
      MEDIA_MANIFEST_FILE: /app/data/runtime/media-manifests.json
      MEDIA_STREAM_MODE: local-cache
      # Optional institutional EaaSI node. Keep tokens in deployment secrets,
      # not in this repository.
      EAASI_BASE_URL: ""
      EAASI_OAI_URL: ""
      EAASI_API_TOKEN: ""
      EAASI_TENANT_ID: ""
      RESTRICTED_FLAGS: secret-sacred,community-restricted,embargoed
    volumes:
      - archai_data:/app/data
      # Mount NFC pages for serving
      - ./nfc-pages/v:/app/public/aux:ro
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Qdrant Vector DB ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: archai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cloudflare Tunnel (public access) ───────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: archai_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run archai-api
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # Alternative: mount credentials file
    # volumes:
    #   - ~/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - archai

volumes:
  archai_data:
  qdrant_storage:
    # Reuse existing Qdrant data across local demo collections
    external: true
    name: archaiapp_qdrant_data
